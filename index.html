<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣計程車 GPS 跳表 (招財牌 HC-1 擬真版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

        :root {
            /* 實體機外觀配色 */
            --casing-yellow: #f5b016;
            --casing-yellow-dark: #c98a00;
            --frame-black: #1a1a1a;
            --screen-green: #5dfc5d;
            --screen-green-dim: #4ce04c;
            --lcd-text: #112d11;
            --led-red-glow: #ff1a1a;
            --led-red-dark: #500000;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            background-image: radial-gradient(#222 20%, transparent 80%), radial-gradient(#2c2c2c 10%, transparent 90%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'Helvetica Neue', 'PingFang TC', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 橫向儀表板主容器 */
        .dashboard {
            display: flex;
            flex-direction: column;
            width: 92vw;
            max-width: 900px;
            height: 85vh;
            max-height: 520px;
            position: relative;
        }

        /* 出紙口 (收據滑出動畫) */
        .paper-slot {
            position: absolute;
            top: -5px;
            left: 20%;
            width: 60%;
            height: 10px;
            background: #000;
            border-radius: 5px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 乘車收據樣式 */
        .receipt {
            position: absolute;
            top: 2px;
            left: 25%;
            width: 50%;
            background: #fff;
            color: #000;
            font-family: monospace;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 2px;
            z-index: 5;
            transform: translateY(-105%);
            transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
            max-height: 380px;
            overflow: hidden;
            font-size: 11px;
            line-height: 1.4;
            border-bottom: 3px dashed #bbb;
        }

        .receipt.print-out {
            transform: translateY(0%);
        }

        .receipt-title {
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 10px;
            border-bottom: 1px dashed #000;
            padding-bottom: 5px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .receipt-total {
            border-top: 1px dashed #000;
            margin-top: 8px;
            padding-top: 5px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        /* 實體跳表機外殼 */
        .meter-body {
            flex: 1;
            background: linear-gradient(145deg, var(--casing-yellow), var(--casing-yellow-dark));
            border-radius: 20px;
            padding: 22px;
            border: 6px solid #b37a00;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 3px 10px rgba(255,255,255,0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 15;
            position: relative;
        }

        /* 黑色內玻璃鏡面框 */
        .screen-bezel {
            background-color: var(--frame-black);
            border-radius: 12px;
            padding: 10px 15px 15px 15px;
            border: 4px solid #3a3a3a;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9), 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* 玻璃上方的印字標籤 */
        .glass-labels {
            display: grid;
            grid-template-columns: 1.8fr 1.8fr 2fr 1.4fr;
            text-align: center;
            color: #ddd;
            font-size: 13px;
            font-weight: bold;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
            letter-spacing: 1px;
            text-shadow: 1px 1px 1px #000;
        }

        .brand-logo {
            position: absolute;
            right: 35px;
            top: 30px;
            color: #ccc;
            font-family: 'Share Tech Mono', sans-serif;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        /* LCD 綠色液晶螢幕 */
        .lcd-screen {
            background: radial-gradient(circle, var(--screen-green) 60%, var(--screen-green-dim) 100%);
            border-radius: 6px;
            margin-top: 10px;
            height: 180px;
            border: 5px solid #0a0a0a;
            box-shadow: inset 0 8px 10px rgba(0,0,0,0.7);
            padding: 12px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* 螢幕玻璃反光特效 */
        .lcd-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 80%);
            pointer-events: none;
            z-index: 3;
        }

        /* LCD 頂部資料列 (通行費、營業區、計時、距離) */
        .lcd-top-row {
            display: grid;
            grid-template-columns: 1.8fr 1.8fr 2fr 1.4fr;
            align-items: flex-end;
            font-family: 'Share Tech Mono', 'VT323', monospace;
            color: var(--lcd-text);
            text-shadow: 0 1px 0px rgba(255,255,255,0.4);
        }

        .lcd-val {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
        }

        /* 營業區特化中文字體 */
        .zone-text {
            font-size: 24px;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            font-weight: bold;
            text-align: center;
            border: 2px solid var(--lcd-text);
            padding: 1px 4px;
            border-radius: 4px;
            display: inline-block;
            margin: 0 auto;
        }

        /* LCD 底部資料列 (時鐘、GPS、車資) */
        .lcd-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-family: 'Share Tech Mono', 'VT323', monospace;
            color: var(--lcd-text);
            text-shadow: 0 1px 0px rgba(255,255,255,0.4);
            margin-top: 15px;
        }

        /* 時鐘 */
        .lcd-clock-container {
            border: 2px solid var(--lcd-text);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.03);
            letter-spacing: 1px;
        }

        /* GPS 訊號圖示 */
        .lcd-gps-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
        }

        .satellite-icon {
            width: 26px;
            height: 26px;
            fill: var(--lcd-text);
        }

        .satellite-icon.searching {
            animation: gps-pulse 1s infinite alternate;
        }

        @keyframes gps-pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* 主車資展示區 */
        .lcd-fare-section {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .fare-chinese-label {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .fare-digit {
            font-size: 78px;
            font-weight: bold;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        .fare-unit {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* 下方實體按鈕區 */
        .physical-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            padding-top: 5px;
        }

        /* 個別按鈕外框 */
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        /* 指示燈 (LED) */
        .led-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--led-red-dark);
            border: 1px solid #111;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
            transition: all 0.2s;
        }

        .led-indicator.active {
            background-color: var(--led-red-glow);
            box-shadow: 0 0 10px var(--led-red-glow), inset 0 1px 1px #fff;
        }

        /* 按鈕本體 */
        .phys-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(to bottom, #444, #222);
            border: 3px solid #111;
            border-radius: 8px;
            color: #eee;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #000, 0 6px 10px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            text-shadow: -1px -1px 1px #000;
            transition: all 0.05s;
        }

        .phys-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000, 0 2px 5px rgba(0,0,0,0.4);
        }

        /* 專屬按鈕配色調校 */
        .phys-btn.empty-btn {
            background: linear-gradient(to bottom, #d32f2f, #9a0007);
            border-color: #5f0000;
            color: #fff;
        }

        .phys-btn.timing-btn {
            background: linear-gradient(to bottom, #0288d1, #01579b);
            border-color: #002f6c;
            color: #fff;
        }

        /* 狀態文字條 */
        .system-status {
            color: #000;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.85;
        }

        /* 直向旋轉警告 */
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            color: white;
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #portrait-warning svg {
            width: 80px; height: 80px; fill: white;
            animation: rotatePhone 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        @media screen and (orientation: portrait) {
            #portrait-warning { display: flex; }
            .dashboard { display: none; }
        }
    </style>
</head>
<body>

    <!-- 垂直螢幕警告 -->
    <div id="portrait-warning">
        <svg viewBox="0 0 24 24">
            <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm1 19c0 .55-.45 1-1 1H8c-.55 0-1-.45-1-1V4c0-.55.45-1 1-1h8c.55 0 1 .45 1 1v16z"/>
        </svg>
        <h2>請將手機旋轉至橫向</h2>
        <p>此擬真計費器專為橫向儀表板模式設計</p>
    </div>

    <!-- 主儀表板 -->
    <div class="dashboard">
        
        <!-- 出紙口 -->
        <div class="paper-slot"></div>

        <!-- 虛擬熱感應收據 -->
        <div class="receipt" id="receiptPaper">
            <div class="receipt-title">台灣計程車乘車證明</div>
            <div class="receipt-row"><span>日期:</span><span id="recDate">2026/07/03</span></div>
            <div class="receipt-row"><span>上車時間:</span><span id="recStartTime">--:--:--</span></div>
            <div class="receipt-row"><span>下車時間:</span><span id="recEndTime">--:--:--</span></div>
            <div class="receipt-row" style="border-top: 1px dashed #ddd; padding-top: 5px;"><span>起跳車資:</span><span>NT$ 85</span></div>
            <div class="receipt-row"><span>行駛里程:</span><span id="recDist">0.00 km</span></div>
            <div class="receipt-row"><span>延滯時間:</span><span id="recDelay">00:00</span></div>
            <div class="receipt-row"><span>高速通行費(ETC):</span><span id="recEtc">NT$ 0</span></div>
            <div class="receipt-total"><span>總金額:</span><span id="recTotal">NT$ 85</span></div>
            <div style="text-align: center; margin-top: 15px; color: #777;">謝謝搭乘 祝您順風</div>
            <button class="modal-btn" style="width: 100%; border: 1px solid #000; background: #eee; padding: 5px 0; margin-top: 10px; cursor: pointer;" onclick="closeReceipt()">撕下收據</button>
        </div>

        <!-- 擬真跳表機主體 -->
        <div class="meter-body">
            
            <div class="brand-logo">HC-1</div>

            <!-- 鏡面外框 -->
            <div class="screen-bezel">
                
                <!-- 上方文字印字標籤 -->
                <div class="glass-labels">
                    <div>通行費 元</div>
                    <div>營業區</div>
                    <div>計時 分 秒</div>
                    <div>距離 公里</div>
                </div>

                <!-- 亮綠色 LCD 螢幕 -->
                <div class="lcd-screen">
                    
                    <!-- LCD 第一排數據 -->
                    <div class="lcd-top-row">
                        <!-- 通行費 -->
                        <div class="lcd-val" id="etcDisplay">0</div>
                        <!-- 營業區 -->
                        <div>
                            <div class="zone-text" id="zoneDisplay">雙北市</div>
                        </div>
                        <!-- 計時分秒 -->
                        <div class="lcd-val" id="delayDisplay">0:0</div>
                        <!-- 距離里程 -->
                        <div class="lcd-val" id="distanceDisplay">.0</div>
                    </div>

                    <!-- LCD 第二排數據 -->
                    <div class="lcd-bottom-row">
                        <!-- 當前時間 (14:13:25) -->
                        <div class="lcd-clock-container" id="clockDisplay">14:13:25</div>
                        
                        <!-- GPS 狀態 -->
                        <div class="lcd-gps-status">
                            <svg class="satellite-icon searching" id="satIcon" viewBox="0 0 24 24">
                                <path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-3.9-5.3-2.9-12.7 2.2-16.8s12.7-2.9 16.8 2.2c3.5 4.5 3.3 11-.5 15.2l-1.38-1.38C20.12 17.15 21 14.69 21 12c0-4.97-4.03-9-9-9zm0 4c-2.76 0-5 2.24-5 5 0 1.15.4 2.21 1.05 3.05l1.41-1.41C9.17 13.14 9 12.59 9 12c0-1.66 1.34-3 3-3s3 1.34 3 3c0 .59-.17 1.14-.46 1.64l1.41 1.41c.65-.84 1.05-1.9 1.05-3.05 0-2.76-2.24-5-5-5zm0 8c-1.1 0-2-.9-2-2 0-.31.08-.6.21-.86l2.65 2.65c-.26.13-.55.21-.86.21z"/>
                            </svg>
                            <span id="accuracyDisplay">NO GPS</span>
                        </div>

                        <!-- 車資 -->
                        <div class="lcd-fare-section">
                            <span class="fare-chinese-label">車資</span>
                            <span class="fare-digit" id="fareDisplay">85</span>
                            <span class="fare-unit">元</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 下方實體按鈕 -->
            <div class="physical-buttons">
                
                <!-- 空 (歸零鍵) -->
                <div class="btn-wrapper">
                    <div class="led-indicator" id="led-empty"></div>
                    <button class="phys-btn empty-btn" onclick="triggerEmpty()">空</button>
                </div>

                <!-- 計程計時 -->
                <div class="btn-wrapper">
                    <div class="led-indicator" id="led-start"></div>
                    <button class="phys-btn" onclick="startMeter()">計程計時</button>
                </div>

                <!-- 停 (暫停鍵) -->
                <div class="btn-wrapper">
                    <div class="led-indicator" id="led-stop"></div>
                    <button class="phys-btn" onclick="stopMeter()">停</button>
                </div>

                <!-- 列印 -->
                <div class="btn-wrapper">
                    <div class="led-indicator" id="led-print"></div>
                    <button class="phys-btn" onclick="printReceipt()">列印</button>
                </div>

                <!-- 高速公路 -->
                <div class="btn-wrapper">
                    <div class="led-indicator" id="led-hwy"></div>
                    <button class="phys-btn" onclick="toggleHwy()">高速公路</button>
                </div>

            </div>

            <div class="system-status" id="sysStatus">HC-1 GPS TACHOMETER READY</div>
        </div>
    </div>

    <!-- 自訂提示視窗 -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-content">
            <h3 id="modalTitle">提示</h3>
            <p id="modalMessage">訊息內容</p>
            <div id="modalActions">
                <button class="modal-btn" onclick="closeModal()">確定</button>
            </div>
        </div>
    </div>

    <script>
        // --- 費率常數設定 (2023大台北標準) ---
        const BASE_FARE = 85;             // 起跳價
        const BASE_DISTANCE = 1250;       // 起跳里程 (公尺)
        const DISTANCE_INCREMENT = 200;   // 續程單位 (公尺)
        const DISTANCE_FARE = 5;          // 續程加收金額
        const DELAY_SPEED_LIMIT = 5;      // 延滯時速門檻 (km/h)
        const DELAY_TIME_INCREMENT = 60;  // 延滯單位 (秒)
        const DELAY_FARE = 5;             // 延滯加收金額

        // --- 系統狀態變數 ---
        let isRunning = false;
        let watchId = null;
        let delayTimer = null;
        
        let lastPos = null;
        let totalDistance = 0; // 累積公尺
        let delaySeconds = 0;  // 累積延滯秒數
        let etcToll = 0;       // 模擬ETC通行費
        let currentFare = BASE_FARE;
        let previousFare = BASE_FARE;
        let currentSpeed = 0;  // km/h

        let isHighway = false;     // 高速公路模式

        // 收據記錄用
        let startTimeStr = "--:--:--";
        let endTimeStr = "--:--:--";

        // --- 音效系統 (Web Audio API) ---
        let audioCtx = null;

        // 嗶一聲 (按鍵反饋)
        function playBeep(freq = 1500, duration = 0.05) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.error(e); }
        }

        // 跳金幣聲 (跳表加錢時)
        function playCoinSound() {
            try {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(2400, audioCtx.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) { console.error(e); }
        }

        // --- DOM 元素 ---
        const ui = {
            fare: document.getElementById('fareDisplay'),
            dist: document.getElementById('distanceDisplay'),
            speed: document.getElementById('accuracyDisplay'), // 用原來的欄位當作速度/GPS狀態展示
            delay: document.getElementById('delayDisplay'),
            clock: document.getElementById('clockDisplay'),
            etc: document.getElementById('etcDisplay'),
            zone: document.getElementById('zoneDisplay'),
            sysStatus: document.getElementById('sysStatus'),
            satIcon: document.getElementById('satIcon'),
            
            // 指示燈
            ledEmpty: document.getElementById('led-empty'),
            ledStart: document.getElementById('led-start'),
            ledStop: document.getElementById('led-stop'),
            ledHwy: document.getElementById('led-hwy'),
            
            // 彈窗與收據
            receipt: document.getElementById('receiptPaper'),
            modal: document.getElementById('customModal'),
            modalTitle: document.getElementById('modalTitle'),
            modalMsg: document.getElementById('modalMessage'),
            modalActions: document.getElementById('modalActions')
        };

        // --- 實時時鐘 (底部左側) ---
        function updateClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            ui.clock.innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 核心邏輯：計算兩點距離 (Haversine Formula) ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // 地球半徑 (m)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // --- 營業區動態偵測 (依據經緯度估算台灣縣市) ---
        function detectZone(lat, lon) {
            // 簡單的 bounding box 快速判斷縣市營業區
            if (lat >= 24.85 && lat <= 25.3 && lon >= 121.3 && lon <= 122.0) {
                return "雙北市";
            } else if (lat >= 24.6 && lat <= 25.1 && lon >= 121.0 && lon <= 121.5) {
                return "桃園市";
            } else if (lat >= 24.0 && lat <= 24.4 && lon >= 120.5 && lon <= 121.4) {
                return "台中市";
            } else if (lat >= 22.8 && lat <= 23.4 && lon >= 120.0 && lon <= 120.5) {
                return "台南市";
            } else if (lat >= 22.4 && lat <= 23.1 && lon >= 120.1 && lon <= 120.8) {
                return "高雄市";
            }
            return "基北區"; // 預設值
        }

        // --- UI 畫面刷新 ---
        function updateUI() {
            // 1. 計算車資
            let newFare = BASE_FARE;
            
            // 距離計費
            if (totalDistance > BASE_DISTANCE) {
                const extraDist = totalDistance - BASE_DISTANCE;
                const distJumps = Math.floor(extraDist / DISTANCE_INCREMENT);
                newFare += distJumps * DISTANCE_FARE;
            }

            // 延滯計費
            const delayJumps = Math.floor(delaySeconds / DELAY_TIME_INCREMENT);
            newFare += delayJumps * DELAY_FARE;

            // 加上高速公路模擬通行費 (ETC)
            newFare += etcToll;

            currentFare = newFare;

            // 2. 判斷是否跳表加錢，若是則播放音效
            if (currentFare > previousFare) {
                playCoinSound();
                previousFare = currentFare;
            }

            // 3. 更新 LCD 螢幕文字
            ui.fare.innerText = currentFare;
            ui.etc.innerText = etcToll;
            
            // 里程轉換為公里數，格式配合老舊 LCD 的 「.X」顯示
            // 例如 1.5 公里顯示成「1.5」，0.0 顯示「.0」
            const km = (totalDistance / 1000).toFixed(1);
            ui.dist.innerText = km === "0.0" ? ".0" : km;

            // 格式化延滯計時「分:秒」，擬真版寫法：「分:秒」 (例如 2:45)
            const mins = Math.floor(delaySeconds / 60);
            const secs = delaySeconds % 60;
            ui.delay.innerText = `${mins}:${secs}`;
        }

        // --- GPS 位置解析 ---
        function handlePosition(position) {
            if (!isRunning) return;

            const { latitude, longitude, accuracy, speed } = position.coords;
            const timestamp = position.timestamp;

            // 判斷時速 (設備若無時速，待會用距離估算)
            let calcSpeed = speed !== null ? (speed * 3.6) : 0;

            // 訊號過差過濾 (誤差大於 50 米)
            if (accuracy > 50) {
                ui.sysStatus.innerText = `訊號弱 (${Math.round(accuracy)}m)`;
                ui.speed.innerText = "訊號弱";
                ui.satIcon.classList.add('searching');
                return;
            }

            // GPS 連線良好
            ui.satIcon.classList.remove('searching');
            ui.speed.innerText = `${Math.round(calcSpeed)} km/h`;
            ui.sysStatus.innerText = `GPS 連線正常 (精確度: ${Math.round(accuracy)}m)`;

            // 動態更新營業區
            const detected = detectZone(latitude, longitude);
            ui.zone.innerText = detected;

            if (lastPos) {
                const distDiff = calculateDistance(lastPos.lat, lastPos.lon, latitude, longitude);
                const timeDiff = (timestamp - lastPos.time) / 1000;

                // 2米至300米內算有效移動 (過濾原地靜止飄移)
                if (distDiff > 2 && distDiff < 300) {
                    totalDistance += distDiff;
                    
                    // 高速公路模式：每走 1 公里，模擬累積 15 元通行費 (ETC)
                    if (isHighway) {
                        // 每移動 1000 米加 15 元
                        const preKm = Math.floor((totalDistance - distDiff) / 1000);
                        const curKm = Math.floor(totalDistance / 1000);
                        if (curKm > preKm) {
                            etcToll += 15;
                            playBeep(2000, 0.1); // 發出 ETC 扣款的嗶嗶聲
                        }
                    }

                    if (speed === null && timeDiff > 0) {
                        calcSpeed = (distDiff / timeDiff) * 3.6;
                    }
                }
            }

            currentSpeed = calcSpeed;
            lastPos = { lat: latitude, lon: longitude, time: timestamp };
            
            updateUI();
        }

        function handleGPSError(error) {
            let msg = "GPS 錯誤";
            if (error.code === 1) msg = "請允許 Safari 定位權限";
            if (error.code === 2) msg = "無法取得 GPS 定位";
            if (error.code === 3) msg = "GPS 連線逾時";
            
            ui.sysStatus.innerText = "錯誤: " + msg;
            ui.speed.innerText = "ERR";
            stopMeter();
            showModal('error', msg);
        }

        // --- 延滯計時監聽 (每秒觸發) ---
        function checkDelay() {
            if (!isRunning) return;

            // 高速公路模式下不計低速延滯時間
            if (isHighway) return;

            // 時速低於門檻 5km/h，計時累計
            if (currentSpeed < DELAY_SPEED_LIMIT) {
                delaySeconds++;
                updateUI();
            }
        }

        // --- 控制按鈕實作 ---

        // 1. 計程計時 (開始按鈕)
        function startMeter() {
            playBeep();
            if (isRunning) return;

            // 記錄上車時間
            const now = new Date();
            startTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            // 初始化 Web Audio API
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            isRunning = true;
            ui.ledStart.classList.add('active');
            ui.ledStop.classList.remove('active');
            ui.ledEmpty.classList.remove('active');
            
            ui.sysStatus.innerText = "正在取得 GPS 定位...";
            ui.speed.innerText = "SEARCH";

            watchId = navigator.geolocation.watchPosition(
                handlePosition,
                handleGPSError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                }
            );

            delayTimer = setInterval(checkDelay, 1000);
        }

        // 2. 停 (暫停按鈕)
        function stopMeter() {
            playBeep();
            if (!isRunning) return;

            // 記錄下車時間
            const now = new Date();
            endTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            isRunning = false;
            ui.ledStart.classList.remove('active');
            ui.ledStop.classList.add('active');
            ui.sysStatus.innerText = "暫停計費中";
            ui.speed.innerText = "PAUSE";

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (delayTimer !== null) {
                clearInterval(delayTimer);
                delayTimer = null;
            }
            
            currentSpeed = 0;
            updateUI();
        }

        // 3. 空 (歸零復原)
        function triggerEmpty() {
            playBeep(800, 0.2); // 比較重沉的按鍵聲
            if (isRunning) stopMeter();
            
            totalDistance = 0;
            delaySeconds = 0;
            etcToll = 0;
            currentFare = BASE_FARE;
            previousFare = BASE_FARE;
            currentSpeed = 0;
            lastPos = null;

            isHighway = false;
            ui.ledHwy.classList.remove('active');
            ui.ledEmpty.classList.add('active');
            ui.ledStop.classList.remove('active');

            updateUI();
            ui.sysStatus.innerText = "已清空歸零。空車狀態。";
            ui.speed.innerText = "READY";
            closeReceipt();
        }

        // 4. 高速公路切換
        function toggleHwy() {
            playBeep();
            if (!isRunning) {
                showModal('error', "請先按下「計程計時」開始計費，才能啟用高速公路模式。");
                return;
            }
            isHighway = !isHighway;
            ui.ledHwy.classList.toggle('active', isHighway);
            ui.sysStatus.innerText = isHighway ? "高速公路模式 (不計延滯時間，累加模擬ETC)" : "一般市區道路模式";
        }

        // 5. 列印乘車證明收據
        function printReceipt() {
            playBeep(2000, 0.4); // 尖銳高頻嗶聲，像發票機列印聲
            
            if (isRunning) {
                stopMeter();
            }

            // 如果是在初始狀態就點列印，隨機模擬下車時間以便展示
            if (endTimeStr === "--:--:--") {
                const now = new Date();
                endTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            }

            // 更新收據單文字內容
            const now = new Date();
            document.getElementById('recDate').innerText = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`;
            document.getElementById('recStartTime').innerText = startTimeStr;
            document.getElementById('recEndTime').innerText = endTimeStr;
            document.getElementById('recDist').innerText = `${(totalDistance / 1000).toFixed(2)} km`;
            
            const mins = Math.floor(delaySeconds / 60);
            const secs = delaySeconds % 60;
            document.getElementById('recDelay').innerText = `${mins}分${secs}秒`;
            document.getElementById('recEtc').innerText = `NT$ ${etcToll}`;
            document.getElementById('recTotal').innerText = `NT$ ${currentFare}`;

            // 滑出收據
            ui.receipt.classList.add('print-out');
            ui.ledEmpty.classList.remove('active');
        }

        function closeReceipt() {
            ui.receipt.classList.remove('print-out');
        }

        // --- 彈窗系統 ---
        function showModal(type, msg = "") {
            ui.modal.style.display = 'flex';
            if (type === 'reset') {
                ui.modalTitle.innerText = "重新計算";
                ui.modalMsg.innerText = "確定要將所有車資、里程、ETC通行費歸零嗎？";
                ui.modalActions.innerHTML = `
                    <button class="modal-btn" style="background:#555; color:white; margin-right:10px;" onclick="closeModal()">取消</button>
                    <button class="modal-btn" style="background:var(--led-red-glow); color:white;" onclick="triggerEmpty(); closeModal();">確定歸零</button>
                `;
            } else if (type === 'error') {
                ui.modalTitle.innerText = "系統提示";
                ui.modalMsg.innerText = msg;
                ui.modalActions.innerHTML = `<button class="modal-btn" onclick="closeModal()">確定</button>`;
            }
        }

        function closeModal() {
            ui.modal.style.display = 'none';
        }

        // 預設將空車工作燈點亮
        ui.ledEmpty.classList.add('active');
        
        // 第一次啟動畫面渲染
        updateUI();

    </script>
</body>
